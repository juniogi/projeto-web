<section class="cadastro-page">
  <div class="container">
    <h2 class="page-title">Criar Conta</h2>

    <div class="cadastro-box">
      <div class="form-group mb-3">
        <label>Nome</label>
        <input type="text" class="form-control" [(ngModel)]="nome" placeholder="Seu nome completo" />
      </div>

      <div class="form-group mb-3">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" placeholder="seu@email.com" />
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <div class="form-group">
            <label>Senha</label>
            <input type="password" class="form-control" [(ngModel)]="senha" placeholder="Crie uma senha" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" class="form-control" [(ngModel)]="confirma" placeholder="Repita a senha" />
          </div>
        </div>
      </div>

      <div class="form-group mb-3">
        <label>CPF</label>
        <input type="text" class="form-control" [(ngModel)]="cpf" placeholder="000.000.000-00" />
      </div>

      <div class="form-group mb-4">
        <label>Telefone</label>
        <input type="text" class="form-control" [(ngModel)]="telefone" placeholder="(11) 99999-9999" />
      </div>

      <button class="btn btn-warning btn-lg w-100" (click)="onCadastro()">Cadastrar</button>

      <p class="login-link">
        Já tem conta? <a routerLink="/login">Faça login</a>
      </p>
    </div>
  </div>
</section>
