<section class="cesta">
  <div class="container">
    <h2 class="page-title">Minha Cesta</h2>

    <div class="empty-cart" *ngIf="items.length === 0">
      <h3>Sua cesta está vazia</h3>
      <p>Adicione produtos deliciosos da nossa padaria!</p>
      <a routerLink="/" class="btn btn-warning btn-lg">Ver Produtos</a>
    </div>

    <div *ngIf="items.length > 0">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Item</th>
              <th class="text-center">Qtd</th>
              <th class="text-end">Valor</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of items">
              <td>
                <div class="item-info">
                  <img [src]="item.product.image" [alt]="item.product.name" class="item-image" />
                  <span class="item-name">{{ item.product.name }}</span>
                </div>
              </td>
              <td class="text-center">{{ item.quantity }}x</td>
              <td class="text-end">{{ formatPrice(item.product.price * item.quantity) }}</td>
              <td class="text-end">
                <button class="btn-remove" (click)="removeItem(item.product.id)">Remover</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="cart-total">
        <span class="total-label">Total:</span>
        <span class="total-value">{{ formatPrice(getTotal()) }}</span>
      </div>

      <div class="cart-actions">
        <button class="btn btn-outline-danger btn-lg" (click)="clearCart()">Limpar Cesta</button>
        <button class="btn btn-warning btn-lg" (click)="finalizar()">Finalizar Compra</button>
      </div>
    </div>
  </div>
</section>
